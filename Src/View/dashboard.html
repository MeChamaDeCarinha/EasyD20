<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <title>EasyD20 - Dashboard</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./Src/View/dashboard.css">

<body>

        </div>
        <br>
        <div class="icons">
            <span class="material-symbols-outlined">forest</span>

            <span class="material-symbols-outlined">explore</span>

        </div>
        <div class="icons">
            <span class="material-symbols-outlined">backpack</span>
            <span class="label">Inventário</span>
        </div>
        <br>
        <div class="icons">
            <span class="material-symbols-outlined">help</span>
            <span class="label">Ajuda</span>
        </div>
        <div class="icons">
            <span class="material-symbols-outlined">settings</span>

    <script src="Src/View/sidebar.js"></script>

</html>
